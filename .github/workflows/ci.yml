name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test-and-run-notebooks:
    runs-on: ubuntu-latest
    timeout-minutes: 120         # backstop: a full run (shared-code change) re-executes the spectral/CatBoost notebooks
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0         # need history to diff which chapters changed
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip             # cache wheels across runs (torch/catboost are large)
      - name: Install package + notebook/dev extras
        run: |
          python -m pip install --upgrade pip
          # CPU-only torch first, so the editable install does NOT pull the ~2GB CUDA wheel
          python -m pip install torch --index-url https://download.pytorch.org/whl/cpu
          python -m pip install -e ".[notebooks,dev]"
      - name: Register the python3 kernel
        run: python -m ipykernel install --user --name python3
      - name: Decide scope (chapters are independent; only run what changed)
        id: scope
        run: |
          # A notebook's clean execution depends only on (a) its own chapter module + notebook,
          # and (b) the shared library it imports (src/lkbook/data.py, plotting.py). Nothing else
          # affects it: a workflow edit, a README, or a version bump changes no executed code, so
          # it re-runs NOTHING. A change to a shared module re-runs ALL chapters (they all import
          # it). A chapter commit re-runs only that chapter.
          base="${{ github.event.before }}"
          run_all=0
          changed=""
          if [ -n "$base" ] && git cat-file -e "${base}^{commit}" 2>/dev/null; then
            changed=$(git diff --name-only "$base" "${{ github.sha }}")
          else
            run_all=1                                   # first push / new branch / PR: be safe
          fi
          # Shared library modules = src/lkbook/*.py EXCEPT __init__.py (which only carries the
          # version + re-exports). Counted, not `grep -v`, for grep-variant portability.
          if [ "$run_all" -eq 0 ]; then
            top=$(printf '%s\n' "$changed" | grep -cE '^src/lkbook/[^/]+\.py$')
            ini=$(printf '%s\n' "$changed" | grep -cE '^src/lkbook/__init__\.py$')
            [ "$((top - ini))" -gt 0 ] && run_all=1
          fi
          chapters=$(printf '%s\n' "$changed" | grep -oE 'ch[0-9]+' | sort -u | tr '\n' ' ')
          echo "Changed files:"; echo "$changed"
          echo "run_all=$run_all  chapters=[$chapters]"
          echo "run_all=$run_all" >> "$GITHUB_OUTPUT"
          echo "chapters=$chapters" >> "$GITHUB_OUTPUT"
      - name: Run tests
        run: |
          if [ "${{ steps.scope.outputs.run_all }}" = "1" ]; then
            echo "full test suite"; pytest -q
          elif [ -n "${{ steps.scope.outputs.chapters }}" ]; then
            files=""
            for c in ${{ steps.scope.outputs.chapters }}; do
              [ -f "tests/test_${c}.py" ] && files="$files tests/test_${c}.py"
            done
            if [ -n "$files" ]; then echo "scoped tests:$files"; pytest -q $files
            else echo "no chapter tests for changed chapters; skipping"; fi
          else
            echo "no executed code changed; skipping tests"
          fi
      - name: Execute notebooks (only changed chapters)
        run: |
          if [ "${{ steps.scope.outputs.run_all }}" = "1" ]; then
            nbs=$(ls notebooks/*.ipynb)
          elif [ -n "${{ steps.scope.outputs.chapters }}" ]; then
            nbs=""
            for c in ${{ steps.scope.outputs.chapters }}; do
              for f in notebooks/${c}_*.ipynb; do [ -f "$f" ] && nbs="$nbs $f"; done
            done
          else
            echo "no executed code changed; skipping notebook execution"; nbs=""
          fi
          echo "executing:"; echo "$nbs"
          for nb in $nbs; do
            jupyter nbconvert --to notebook --execute --inplace \
              --ExecutePreprocessor.timeout=1800 \
              --ExecutePreprocessor.kernel_name=python3 "$nb"
          done
